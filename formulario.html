<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina</title>
</head>

<body>
    <h1>formulario</h1>
    <form action="" method="post">
        <h2>Datos para el form</h2>
        <h3>con input</h3>
        <label for="nombre">nombre:</label>
        <input type="text" id="nombre" name="nombre">
        <BR></BR>
        <label for="usuario">password:</label>
        <input type="password" name="password">
        <BR></BR>
        <label for="usuario">correo:</label>
        <input type="email" name="correo">
        <BR></BR>


        <div class="radio">
            <h2>Género</h2>
            <h3>con radio</h3>
            <label>
                <input type="radio" name="genero" value="masculino">
                Masculino
            </label>

            <label>
                <input type="radio" name="genero" value="femenino">
                Femenino
            </label>
        </div>
        <br>
        <div>
            
            <h2>Hobbies</h2>
            <label>
                <input type="checkbox" name="hobbie" value="deporte">
                deporte
            </label>

            <label>
                <input type="checkbox" name="hobbie" value="jugar">
                jugar
            </label>

            <label>
                <input type="checkbox" name="hobbie" value="no_hacer_nada">
                no hacer nada
            </label>
        </div>


        <div class="container">
            <H2>Pais</H2>
            <h3>select box</h3>
            <select name="pais">
                <option value="uy">Uruguay</option>
                <option value="ar">Argentina</option>
            </select>
        </div>


        <div class="container">
            <h2>Area de texto</h2>
            <h3>con text area</h3>
            <textarea name="mensaje"></textarea>
        </div>
        <h2>botones</h2>
        <button type="submit">enviar </button>
        <button type="reset">borrar</button>
    </form>
</body>

</html>
